name: Release

# Publish a package by pushing a tag of the form `<package>-v<version>`.
#
#   Examples:
#     alien-trees-v0.1.0        → publishes packages/alien-trees at 0.1.0
#     alien-projections-v0.2.0  → publishes packages/alien-projections at 0.2.0
#     alien-resources-v0.2.0    → publishes packages/alien-resources at 0.2.0
#
# The workflow:
#   1. Parses the tag to determine which package + version
#   2. Verifies package.json version matches the tag (prevents drift)
#   3. Installs deps, builds (tsc), publishes with npm provenance
#   4. Creates a GitHub release with autogenerated notes
#
# See CLAUDE.md "Releasing" for full flow. Required GitHub secret: NPM_TOKEN.

on:
  push:
    tags:
      - "*-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create GitHub release
      id-token: write # npm provenance (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"                                  # e.g. alien-trees-v0.1.0
          PKG="${TAG%-v*}"                                          # alien-trees
          VERSION="${TAG##*-v}"                                     # 0.1.0
          if [[ ! -d "packages/$PKG" ]]; then
            echo "::error::tag $TAG does not map to a packages/$PKG directory"
            exit 1
          fi
          MANIFEST_VERSION=$(jq -r .version "packages/$PKG/package.json")
          if [[ "$MANIFEST_VERSION" != "$VERSION" ]]; then
            echo "::error::tag version $VERSION does not match packages/$PKG/package.json version $MANIFEST_VERSION"
            exit 1
          fi
          echo "pkg=$PKG"          >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          echo "dir=packages/$PKG" >> "$GITHUB_OUTPUT"
          echo "Publishing $PKG@$VERSION from packages/$PKG"

      - uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install package deps
        run: bun install
        working-directory: ${{ steps.parse.outputs.dir }}

      - name: Build package
        run: bun run build
        working-directory: ${{ steps.parse.outputs.dir }}

      # pnpm publish (not npm publish) so publishConfig.exports overrides apply.
      # npm publish ignores publishConfig.exports; pnpm applies it. bearly
      # packages keep `exports` pointing at ./src/* for Bun workspace local dev
      # and `publishConfig.exports` pointing at ./dist/* for npm consumers.
      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks --provenance
        working-directory: ${{ steps.parse.outputs.dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.parse.outputs.pkg }} v${{ steps.parse.outputs.version }}
          generate_release_notes: true
