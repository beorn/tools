name: built-artifacts

# Freshness gate for committed build artifacts.
#
# Some plugins ship a *committed* bundled adapter (e.g. tribe's server.mjs is
# `bun build`-ed from tools/stdio-adapter.ts). If a commit touches the source
# without rerunning the build, the committed artifact silently drifts — this is
# exactly the bug that dropped tribe DM bodies on the wire (2026-05-20/21).
#
# This job rebuilds every such artifact and asserts `git diff --exit-code` is
# clean. A non-empty diff means a stale committed artifact — fail the build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: built-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  built-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Rebuild tribe server.mjs
        run: bun run build
        working-directory: plugins/tribe

      - name: Assert built artifacts are fresh
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "::error::A committed build artifact is stale (rebuild produced a diff)."
            echo "::error::Run the plugin's build script locally + commit the result before pushing."
            echo "::error::e.g. (cd plugins/tribe && bun run build) then commit server.mjs"
            exit 1
          fi
